<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Bartolomei</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0f0f0f;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #ffffff;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      color: #cccccc;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .email-button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #ffffff;
      color: #000000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .email-button:hover {
      background-color: #dddddd;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Replace this with your photo -->
    <img class="profile-img" src="background.png" alt="Profile Photo" />

    <h1>Daniel Bartolomei</h1>

    <p>
      Independent contractor working in marketing, content, and digital strategy.
      Available for freelance projects and collaborations.
    </p>

    <a class="email-button" href="mailto:daniel@danielbartolomei.com">
      Email Me
    </a>

    <footer>
      © 2026 Daniel Bartolomei
    </footer>

  </div>
</body>
</html>
