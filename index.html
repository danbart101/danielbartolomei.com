<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniel Bartolomei</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      color: white;
    }

    /* Background image */
    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("bartolomei-website-background.png") no-repeat center center/cover;
      filter: brightness(0.6);
      z-index: -1;
    }

    /* Top nav */
    .nav {
      position: absolute;
      top: 30px;
      left: 40px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Center content */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .center h1 {
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .button {
      padding: 12px 22px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <!-- Name top left -->
  <div class="nav">
    Daniel Bartolomei
  </div>

  <!-- Center content -->
  <div class="center">
    <h1>Let’s work together.</h1>
    <a class="button" href="mailto:daniel@danielbartolomei.com">
      Email Me
    </a>
  </div>

</body>
</html>
